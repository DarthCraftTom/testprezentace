<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Projekty | Rozcestník</title>
    <style>
        /* --- ZÁKLADNÍ NASTAVENÍ A BARVY --- */
        :root {
            --bg: #ffffff;
            --text-main: #222222;
            --text-desc: #555555;
            --card-bg: #f5f5f5;
            --card-border: #e0e0e0;
            --card-hover: #e8f0fe;
            --accent: #1a73e8; /* Modrá barva nadpisu */
        }

        /* Tmavý režim (automaticky podle systému) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --text-main: #eeeeee;
                --text-desc: #aaaaaa;
                --card-bg: #1e1e1e;
                --card-border: #333333;
                --card-hover: #28303d;
                --accent: #8ab4f8;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* --- HLAVIČKA --- */
        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 { margin-bottom: 0.5rem; }
        
        .subtitle { color: var(--text-desc); }

        /* --- SEZNAM PROJEKTŮ --- */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 1rem; /* Mezera mezi jednotlivými odkazy */
        }

        .project-card {
            display: block;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 1.5rem;
            text-decoration: none; /* Odstraní podtržení odkazu */
            color: inherit;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .project-card:hover {
            background-color: var(--card-hover);
            border-color: var(--accent);
        }

        .project-title {
            color: var(--accent);
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .project-desc {
            color: var(--text-desc);
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Rozcestník mých projektů</h1>
            <p class="subtitle">Seznam odkazů na mé weby a aplikace.</p>
        </header>

        <!-- Zde se projekty vygenerují automaticky pomocí JavaScriptu -->
        <main class="project-list" id="seznamProjektu"></main>
    </div>

    <script>
        // ==========================================
        // NASTAVENÍ TVÝCH PROJEKTŮ
        // ==========================================
        // Pro přidání dalšího projektu stačí jednoduše přidat další položku do tohoto seznamu.
        
        const projekty = [
            {
                cesta: "testprezentace",
                nazev: "Interaktivní prezentace",
                popis: "HTML prezentace ve stylu PowerPointu s možností exportu do PDF, změnou motivů a animacemi."
            },
            {
                cesta: "dalsiprojekt",
                nazev: "Další projekt (Připravuje se)",
                popis: "Zde bude krátký popis dalšího projektu. Odkaz se poskládá naprosto sám."
            }
        ];

        // ==========================================
        // CHYTRÁ TVORBA ODKAZŮ (LOGIKA)
        // ==========================================
        const container = document.getElementById('seznamProjektu');

        projekty.forEach(projekt => {
            // 1. Vytvoření HTML elementu pro odkaz (kartu)
            const karta = document.createElement('a');
            
            // 2. CHYTRÁ TVORBA URL:
            // Najde aktuální adresu webu, odstraní "index.html" (pokud tam je) a za poslední lomítko
            // přidá název tvé složky z nastavení výše.
            let aktualniUrl = window.location.href;
            let zakladniCesta = aktualniUrl.substring(0, aktualniUrl.lastIndexOf('/') + 1);
            karta.href = zakladniCesta + projekt.cesta + "/";
            
            /* POZNÁMKA PRO GITHUB PAGES: 
            Pokud je "testprezentace" tvůj ÚPLNĚ NOVÝ repozitář na GitHubu (nikoliv složka v repozitáři rozcestníku), 
            správná URL musí vycházet úplně od základu domény, jinak dostaneš chybu 404 (Not Found).
            Pokud ti to po nasazení nebude fungovat, smaž dva řádky s logikou výše a odkomentuj tento jeden řádek níže:
            
            // karta.href = window.location.origin + "/" + projekt.cesta + "/";
            */

            // 3. Přiřazení stylů a chování (otevření v nové záložce)
            karta.className = "project-card";
            karta.target = "_blank"; 
            karta.rel = "noopener noreferrer";

            // 4. Naplnění karty textem z nastavení
            karta.innerHTML = `
                <h2 class="project-title">${projekt.nazev}</h2>
                <p class="project-desc">${projekt.popis}</p>
            `;

            // 5. Vložení hotové karty na stránku
            container.appendChild(karta);
        });
    </script>
</body>
</html>
